<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClubHub - Club Details</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="navbar"></div>
    
    <main>
        <div class="container">
            <div id="clubDetailContainer">
                </div>
        </div>
    </main>
    
    <div id="footer"></div>
    
    <script src="js/data.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/components.js"></script>
    <script>
        function getClubIdFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return parseInt(params.get('id'));
        }
        
        function renderClubDetail() {
            const container = document.getElementById('clubDetailContainer');
            const clubId = getClubIdFromUrl();
            const club = getClubById(clubId);
            
            if (!club) {
                container.innerHTML = `
                    <div class="card text-center">
                        <h2>Club not found</h2>
                        <a href="clubs.html" class="btn btn-primary">Back to Clubs</a>
                    </div>
                `;
                return;
            }
            
            // FIX: Renamed local constant variable to avoid shadowing global function isMember()
            const memberStatus = isMember(club.id);
            const clubEvents = getEventsForClub(club.id);
            
            container.innerHTML = `
                <div class="card">
                    <div class="d-flex justify-between align-center">
                        <h2>${club.name}</h2>
                        <span class="badge badge-primary">${club.category}</span>
                    </div>
                    <p class="mt-2">${club.description}</p>
                    <p class="text-muted">👥 ${club.seedMembers} members</p>
                    
                    <div class="mt-3">
                        ${memberStatus 
                            ? `<button class="btn btn-danger" onclick="handleLeave(${club.id})">Leave Club</button>`
                            : `<button class="btn btn-success" onclick="handleJoin(${club.id})">Join Club</button>`
                        }
                    </div>
                </div>
                
                <div class="mt-4">
                    <h3>Upcoming Events</h3>
                    ${clubEvents.length > 0 ? `
                        <div class="card-grid mt-2">
                            ${clubEvents.map(event => `
                                <div class="card">
                                    <h4>${event.title}</h4>
                                    <p class="text-muted" style="font-size: 0.95rem;">
                                        <strong>📅 Date:</strong> ${event.date} <br>
                                        <strong>📍 Location:</strong> ${event.location}
                                    </p>
                                    <p>${event.description}</p>
                                    <div class="mt-2">
                                        ${isSignedUp(event.id)
                                            ? `<span class="badge badge-success">✓ Signed Up</span>`
                                            : `<button class="btn btn-secondary btn-sm" onclick="handleSignup(${event.id})">Sign Up</button>`
                                        }
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    ` : `<p class="text-muted">No upcoming events for this club.</p>`}
                </div>
            `;
        }
        
        function handleJoin(clubId) {
            if (joinClub(clubId)) {
                renderClubDetail();
                showAlert('Successfully joined the club!', 'success');
            }
        }
        
        function handleLeave(clubId) {
            if (leaveClub(clubId)) {
                renderClubDetail();
                showAlert('Successfully left the club.', 'info');
            }
        }
        
        function handleSignup(eventId) {
            if (saveSignup(eventId)) {
                renderClubDetail();
                showAlert('Successfully signed up for the event!', 'success');
            }
        }
        
        function showAlert(message, type = 'success') {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;
            
            const container = document.querySelector('.container');
            container.insertBefore(alertDiv, container.firstChild);
            
            setTimeout(() => {
                alertDiv.remove();
            }, 3000);
        }
        
        document.addEventListener('DOMContentLoaded', renderClubDetail);
    </script>
</body>
</html>
