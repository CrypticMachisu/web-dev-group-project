<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClubHub - Events</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="navbar"></div>
    
    <main>
        <div class="container">
            <h1>Upcoming Events</h1>
            <p class="text-muted">Explore exciting events organized by our student communities</p>
            
            <div class="card-grid mt-4" id="eventsContainer">
                </div>
        </div>
    </main>
    
    <div id="footer"></div>
    
    <script src="js/data.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/components.js"></script>
    <script>
        function renderEvents() {
            const container = document.getElementById('eventsContainer');
            const eventsWithClubInfo = getAllEventsWithClubInfo();
            
            if (eventsWithClubInfo.length === 0) {
                container.innerHTML = `<p class="text-muted text-center">No upcoming events listed at this time.</p>`;
                return;
            }
            
            container.innerHTML = eventsWithClubInfo.map(event => {
                const signedUp = isSignedUp(event.id);
                return `
                    <div class="card">
                        <div class="d-flex justify-between align-center">
                            <h3>${event.title}</h3>
                            <span class="badge badge-primary">${event.clubName}</span>
                        </div>
                        <p class="mt-2">${event.description}</p>
                        <p class="text-muted mt-2" style="font-size: 0.95rem;">
                            <strong>📅 Date:</strong> ${event.date} <br>
                            <strong>📍 Location:</strong> ${event.location}
                        </p>
                        <div class="mt-3">
                            ${signedUp 
                                ? `<span class="badge badge-success">✓ Signed Up</span>`
                                : `<button class="btn btn-secondary" onclick="handleSignup(${event.id})">Sign Up for Event</button>`
                            }
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function handleSignup(eventId) {
            if (saveSignup(eventId)) {
                renderEvents();
                showAlert('Successfully signed up for this event!', 'success');
            }
        }
        
        function showAlert(message, type = 'success') {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;
            
            const container = document.querySelector('.container');
            container.insertBefore(alertDiv, container.firstChild);
            
            setTimeout(() => {
                alertDiv.remove();
            }, 3000);
        }
        
        document.addEventListener('DOMContentLoaded', renderEvents);
    </script>
</body>
</html>
