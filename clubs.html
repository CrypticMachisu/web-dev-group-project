<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClubHub - Clubs</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="navbar"></div>
    
    <main>
        <div class="container">
            <h1>All Clubs</h1>
            <p class="text-muted">Discover and join clubs that match your interests</p>
            
            <div class="card-grid mt-4" id="clubsContainer">
                <!-- Clubs will be rendered here -->
            </div>
        </div>
    </main>
    
    <div id="footer"></div>
    
    <script src="js/data.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/components.js"></script>
    <script>
        function renderClubs() {
            const container = document.getElementById('clubsContainer');
            const clubsWithStatus = getClubsWithMembershipStatus();
            
            container.innerHTML = clubsWithStatus.map(club => `
                <div class="card">
                    <div class="d-flex justify-between align-center">
                        <h3>${club.name}</h3>
                        <span class="badge badge-primary">${club.category}</span>
                    </div>
                    <p>${club.description}</p>
                    <p class="text-muted">👥 ${club.seedMembers} members</p>
                    <div class="d-flex gap-2 mt-2">
                        <a href="club-detail.html?id=${club.id}" class="btn btn-primary">View Details</a>
                        ${club.isMember 
                            ? `<button class="btn btn-danger" onclick="handleLeave(${club.id})">Leave</button>`
                            : `<button class="btn btn-success" onclick="handleJoin(${club.id})">Join</button>`
                        }
                    </div>
                </div>
            `).join('');
        }
        
        function handleJoin(clubId) {
            if (joinClub(clubId)) {
                renderClubs();
                showAlert('Successfully joined the club!', 'success');
            }
        }
        
        function handleLeave(clubId) {
            if (leaveClub(clubId)) {
                renderClubs();
                showAlert('Successfully left the club.', 'info');
            }
        }
        
        function showAlert(message, type = 'success') {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;
            
            const container = document.querySelector('.container');
            container.insertBefore(alertDiv, container.firstChild);
            
            setTimeout(() => {
                alertDiv.remove();
            }, 3000);
        }
        
        document.addEventListener('DOMContentLoaded', renderClubs);
    </script>
</body>
</html>
